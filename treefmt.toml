# treefmt — aligned with flake.nix (nixfmt + prettier)
# Pre-commit hook runs: treefmt --fail-on-change --no-cache

[formatter.nix]
command = "nixfmt"
includes = ["*.nix"]

[formatter.prettier]
command = "prettier"
options = ["--write"]
includes = [
  "*.ts",
  "*.js",
  "*.json",
  "*.md",
  "*.yaml",
  "*.yml",
]
