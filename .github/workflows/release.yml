name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create GitHub Releases
  id-token: write # permit the reusable CI workflow's FlakeHub/OIDC needs

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  publish:
    name: publish
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write # create GitHub Release
      id-token: write # npm OIDC trusted publishing + FlakeHub Cache
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Nix cache
        uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Derive version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Tag '$tag' is not a valid semver version (expected vX.Y.Z)"
            exit 1
          fi
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          # npm dist-tag: prereleases (contain a hyphen) go to 'next', else 'latest'.
          if printf '%s' "$version" | grep -q '-'; then
            echo "npm_tag=next" >>"$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >>"$GITHUB_OUTPUT"
          fi

      - name: Set package.json version to tag (source of truth)
        run: nix develop --command bun pm pkg set version="${{ steps.version.outputs.version }}"

      - name: Install dependencies
        run: nix develop --command bun install --frozen-lockfile

      - name: Publish to npm (OIDC trusted publishing — no token)
        run: nix develop --command npm publish --provenance --access public --tag "${{ steps.version.outputs.npm_tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=""
          if printf '%s' "${{ steps.version.outputs.version }}" | grep -q '-'; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            $prerelease_flag
